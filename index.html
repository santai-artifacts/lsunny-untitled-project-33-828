<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.9em;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .stat-box {
            background: #f5f5f5;
            padding: 15px 25px;
            border-radius: 10px;
            flex: 1;
        }

        .stat-label {
            color: #999;
            font-size: 0.8em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #667eea;
            font-size: 1.8em;
            font-weight: bold;
        }

        .game-board {
            background: #bbada0;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .tile {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            font-weight: bold;
            color: #fff;
            background: #cdc1b4;
            position: relative;
            transition: all 0.15s ease-out;
        }

        .tile.merged {
            animation: pop 0.15s ease-out;
        }

        @keyframes pop {
            50% {
                transform: scale(1.1);
            }
        }

        /* Tile colors */
        .tile[data-value="2"] { background: #eee4da; color: #776e65; }
        .tile[data-value="4"] { background: #ede0c8; color: #776e65; }
        .tile[data-value="8"] { background: #f2b179; color: #f9f6f2; }
        .tile[data-value="16"] { background: #f59563; color: #f9f6f2; }
        .tile[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
        .tile[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
        .tile[data-value="128"] { background: #edcf72; color: #095f6b; font-size: 1.5em; }
        .tile[data-value="256"] { background: #edcc61; color: #095f6b; font-size: 1.5em; }
        .tile[data-value="512"] { background: #edc850; color: #095f6b; font-size: 1.5em; }
        .tile[data-value="1024"] { background: #edc53f; color: #095f6b; font-size: 1.2em; }
        .tile[data-value="2048"] { background: #edc22e; color: #095f6b; font-size: 1.2em; }
        .tile[data-value="4096"] { background: #3c3c22; color: #edc22e; }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-new {
            background: #667eea;
            color: white;
        }

        .btn-new:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-undo {
            background: #f5f5f5;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-undo:hover {
            background: #667eea;
            color: white;
        }

        .btn-undo:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal h2 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 15px;
        }

        .modal p {
            color: #666;
            margin-bottom: 25px;
            font-size: 1.1em;
        }

        .modal button {
            padding: 15px 40px;
            font-size: 1.1em;
        }

        .info {
            color: #999;
            font-size: 0.85em;
            margin-top: 15px;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 20px;
            }

            .tile {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <p class="subtitle">Join the tiles and create the 2048 tile!</p>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>

        <div class="game-board">
            <div class="tiles-grid" id="grid"></div>
        </div>

        <div class="buttons">
            <button class="btn-new" onclick="game.newGame()">New Game</button>
            <button class="btn-undo" id="undoBtn" onclick="game.undo()">Undo</button>
        </div>

        <p class="info">Use arrow keys or swipe to move tiles. Combine tiles to reach 2048!</p>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 You Won!</h2>
            <p>Congratulations! You've reached the 2048 tile!</p>
            <button class="btn-new" onclick="game.newGame()">Play Again</button>
        </div>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h2>Game Over</h2>
            <p id="finalScore">Final Score: 0</p>
            <button class="btn-new" onclick="game.newGame()">Try Again</button>
        </div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.size = 4;
                this.board = [];
                this.score = 0;
                this.best = localStorage.getItem('2048-best') || 0;
                this.history = [];
                this.gameOver = false;
                this.won = false;

                this.init();
                this.setupControls();
                this.updateUI();
            }

            init() {
                this.board = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.score = 0;
                this.gameOver = false;
                this.won = false;
                this.history = [];
                this.addNewTile();
                this.addNewTile();
                this.updateUI();
            }

            newGame() {
                document.getElementById('winModal').classList.remove('active');
                document.getElementById('gameOverModal').classList.remove('active');
                this.init();
            }

            addNewTile() {
                const empty = [];
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.board[i][j] === 0) {
                            empty.push({ x: i, y: j });
                        }
                    }
                }

                if (empty.length > 0) {
                    const { x, y } = empty[Math.floor(Math.random() * empty.length)];
                    this.board[x][y] = Math.random() < 0.9 ? 2 : 4;
                }
            }

            move(direction) {
                if (this.gameOver || this.won) return false;

                const oldBoard = JSON.parse(JSON.stringify(this.board));
                let moved = false;

                if (direction === 'left' || direction === 'right') {
                    for (let i = 0; i < this.size; i++) {
                        const row = this.board[i];
                        const newRow = this.slideAndMerge(row, direction === 'right');
                        if (JSON.stringify(row) !== JSON.stringify(newRow)) {
                            moved = true;
                        }
                        this.board[i] = newRow;
                    }
                } else {
                    for (let j = 0; j < this.size; j++) {
                        const col = [this.board[0][j], this.board[1][j], this.board[2][j], this.board[3][j]];
                        const newCol = this.slideAndMerge(col, direction === 'down');
                        if (JSON.stringify(col) !== JSON.stringify(newCol)) {
                            moved = true;
                        }
                        for (let i = 0; i < this.size; i++) {
                            this.board[i][j] = newCol[i];
                        }
                    }
                }

                if (moved) {
                    this.history.push(oldBoard);
                    this.addNewTile();
                    this.checkWin();
                    this.checkGameOver();
                    this.updateUI();
                    return true;
                }

                return false;
            }

            slideAndMerge(line, reverse) {
                if (reverse) {
                    line = line.reverse();
                }

                // Remove zeros
                let newLine = line.filter(val => val !== 0);

                // Merge
                for (let i = 0; i < newLine.length - 1; i++) {
                    if (newLine[i] === newLine[i + 1]) {
                        newLine[i] *= 2;
                        this.score += newLine[i];
                        newLine.splice(i + 1, 1);
                    }
                }

                // Add zeros back
                while (newLine.length < this.size) {
                    newLine.push(0);
                }

                if (reverse) {
                    newLine = newLine.reverse();
                }

                return newLine;
            }

            checkWin() {
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.board[i][j] === 2048) {
                            this.won = true;
                            return;
                        }
                    }
                }
            }

            checkGameOver() {
                // Check for empty tiles
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.board[i][j] === 0) return;
                    }
                }

                // Check for possible merges
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        const current = this.board[i][j];
                        if ((i < this.size - 1 && current === this.board[i + 1][j]) ||
                            (j < this.size - 1 && current === this.board[i][j + 1])) {
                            return;
                        }
                    }
                }

                this.gameOver = true;
            }

            undo() {
                if (this.history.length > 0) {
                    this.board = this.history.pop();
                    this.updateUI();
                }
            }

            updateUI() {
                const grid = document.getElementById('grid');
                grid.innerHTML = '';

                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        const value = this.board[i][j];
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        if (value > 0) {
                            tile.textContent = value;
                            tile.setAttribute('data-value', value);
                        }
                        grid.appendChild(tile);
                    }
                }

                document.getElementById('score').textContent = this.score;

                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('2048-best', this.best);
                }
                document.getElementById('best').textContent = this.best;

                document.getElementById('undoBtn').disabled = this.history.length === 0;

                if (this.won) {
                    setTimeout(() => {
                        document.getElementById('winModal').classList.add('active');
                    }, 300);
                }

                if (this.gameOver) {
                    setTimeout(() => {
                        document.getElementById('finalScore').textContent = `Final Score: ${this.score}`;
                        document.getElementById('gameOverModal').classList.add('active');
                    }, 300);
                }
            }

            setupControls() {
                const directions = {
                    'ArrowUp': 'up',
                    'ArrowDown': 'down',
                    'ArrowLeft': 'left',
                    'ArrowRight': 'right',
                    'w': 'up',
                    's': 'down',
                    'a': 'left',
                    'd': 'right'
                };

                window.addEventListener('keydown', (e) => {
                    if (directions[e.key]) {
                        e.preventDefault();
                        this.move(directions[e.key]);
                    }
                });

                let touchStartX, touchStartY;
                document.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                });

                document.addEventListener('touchend', (e) => {
                    const deltaX = e.changedTouches[0].clientX - touchStartX;
                    const deltaY = e.changedTouches[0].clientY - touchStartY;
                    const minDistance = 50;

                    if (Math.abs(deltaX) > Math.abs(deltaY)) {
                        this.move(deltaX > minDistance ? 'right' : 'left');
                    } else {
                        this.move(deltaY > minDistance ? 'down' : 'up');
                    }
                });
            }
        }

        const game = new Game2048();
    </script>
</body>
</html>
